<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    p.subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    input:focus { border-color: #fe2c55; }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      width: 100%;
      background: #fe2c55;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .log-box {
      margin-top: 24px;
      background: #0e0e0e;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 14px;
      height: 240px;
      overflow-y: auto;
      font-family: 'Menlo', 'Monaco', monospace;
      font-size: 0.78rem;
      color: #aaa;
      display: none;
    }

    .log-box .line { padding: 2px 0; line-height: 1.5; }
    .log-box .line.error { color: #ff5c5c; }
    .log-box .line.done { color: #5cff9d; font-weight: 600; }

    .status {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>TikTok Downloader</h1>
    <p class="subtitle">Enter a profile URL to download all videos to ~/Downloads/tiktok/</p>

    <form id="form">
      <label for="url">Profile URL</label>
      <input id="url" name="url" type="text" placeholder="https://www.tiktok.com/@username" required />

      <label>Date Range (optional)</label>
      <div class="date-row">
        <input id="start_date" name="start_date" type="date" placeholder="Start date" />
        <input id="end_date" name="end_date" type="date" placeholder="End date" />
      </div>

      <button id="btn" type="submit">Download</button>
    </form>

    <div class="log-box" id="log"></div>
    <div class="status" id="status"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const logBox = document.getElementById('log');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      logBox.innerHTML = '';
      logBox.style.display = 'block';
      btn.disabled = true;
      status.textContent = 'Downloading…';

      const data = new FormData(form);

      const res = await fetch('/download', { method: 'POST', body: data });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const msg = line.slice(6);

          if (msg === '__DONE__') {
            const el = document.createElement('div');
            el.className = 'line done';
            el.textContent = '✓ All done!';
            logBox.appendChild(el);
            logBox.scrollTop = logBox.scrollHeight;
            btn.disabled = false;
            status.textContent = 'Finished. Check ~/Downloads/tiktok/';
            break;
          }

          const el = document.createElement('div');
          el.className = 'line' + (msg.startsWith('ERROR') ? ' error' : '');
          el.textContent = msg;
          logBox.appendChild(el);
          logBox.scrollTop = logBox.scrollHeight;
        }
      }
    });
  </script>
</body>
</html>
